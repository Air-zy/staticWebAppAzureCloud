<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diet Analysis Heatmaps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.5rem;
      color: #888;
      font-size: 0.95rem;
    }

    #status {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #aaa;
    }

    #status.error { color: #ff6b6b; }

    #charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .chart-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .chart-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #c9d1e0;
      margin-bottom: 1rem;
      text-transform: capitalize;
    }

    .chart-card img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }

    @media (max-width: 900px) {
      #charts { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Diet Analysis Dashboard</h1>
  <p>Macronutrient breakdown across popular diet types</p>
</header>

<div id="status">Loading data from API...</div>
<div id="charts" style="display:none;"></div>

<script>
  const API_URL = "https://dietanalysis-akg9fehjc3g2htah.canadacentral-01.azurewebsites.net/api/AnalysisFunction";

  async function main() {
    const statusEl = document.getElementById("status");
    const chartsEl = document.getElementById("charts");
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      const data = await res.json();

      const urls = data.charts ?? [];
      if (!urls.length) throw new Error("No chart URLs returned by API");

      urls.forEach(url => {
        const title = url.split("/").pop().replace(/\.\w+$/, "").replace(/_/g, " ");
        const card = document.createElement("div");
        card.className = "chart-card";
        card.innerHTML = `<h2>${title}</h2><img src="${url}" alt="${title}" />`;
        chartsEl.appendChild(card);
      });

      statusEl.style.display = "none";
      chartsEl.style.display = "grid";

    } catch (err) {
      statusEl.textContent = `Failed to load data: ${err.message}`;
      statusEl.className = "error";
      console.error(err);
    }
  }

  main();
</script>
</body>
</html>
