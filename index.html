<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diet Analysis Dashboard</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
}

#auth-overlay {
  position: fixed;
  inset: 0;
  background: #0f1117;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.auth-box {
  background: #1a1d27;
  border: 1px solid #2a2d3a;
  padding: 2rem;
  border-radius: 12px;
  width: 320px;
}

.auth-box h2 {
  margin-bottom: 1rem;
  text-align: center;
}

.auth-box input {
  width: 100%;
  margin-bottom: 0.7rem;
  padding: 0.5rem;
  border-radius: 6px;
  border: 1px solid #2a2d3a;
  background: #0f1117;
  color: #e0e0e0;
}

.auth-box button {
  width: 100%;
  padding: 0.6rem;
  margin-top: 0.5rem;
  border: none;
  border-radius: 6px;
  background: #4f6ef7;
  color: white;
  cursor: pointer;
}

.auth-box .google-btn {
  background: #db4437;
}

.auth-error {
  color: #ff6b6b;
  font-size: 0.8rem;
  margin-top: 0.5rem;
}

/* USER BAR */
#user-bar {
  position: fixed;
  top: 15px;
  right: 20px;
  display: none;
  align-items: center;
  gap: 10px;
}

#logout-btn {
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  border: none;
  background: #ff6b6b;
  color: white;
  cursor: pointer;
}

main { display: none; padding: 2rem; }

header { text-align: center; margin-bottom: 2rem; }

#status { text-align: center; margin-bottom: 1rem; }

</style>
</head>

<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay">
  <div class="auth-box">
    <h2>Login</h2>

    <input id="login-email" placeholder="Email" />
    <input id="login-password" type="password" placeholder="Password" />
    <button onclick="submitLogin()">Login</button>

    <hr style="margin:1rem 0;border-color:#2a2d3a;">

    <h2>Register</h2>

    <input id="reg-name" placeholder="Name" />
    <input id="reg-email" placeholder="Email" />
    <input id="reg-password" type="password" placeholder="Password" />
    <button onclick="submitRegister()">Register</button>

    <button class="google-btn" onclick="window.location='/api/googleAuth'">
      Continue with Google
    </button>

    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<!-- USER BAR -->
<div id="user-bar">
  <span id="user-name"></span>
  <button id="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- DASHBOARD -->
<main id="dashboard">
<header>
  <h1>Diet Analysis Dashboard</h1>
</header>

<div id="status">Loading...</div>

<div id="charts"></div>
</main>

<script>
const API_URL = "https://dietanalysis-akg9fehjc3g2htah.canadacentral-01.azurewebsites.net/api/AnalysisFunction";

/* ================= SAFE JSON ================= */
async function safeJson(res) {
  const text = await res.text();
  if (!text) return null;
  try {
    return JSON.parse(text);
  } catch {
    return null;
  }
}

function parseJwtPayload(token) {
  try {
    const base64 = token.split('.')[1];
    if (!base64) return null;
    return JSON.parse(atob(base64.replace(/-/g, '+').replace(/_/g, '/')));
  } catch {
    return null;
  }
}

function isTokenValid(token) {
  const payload = parseJwtPayload(token);
  return payload && payload.exp > Math.floor(Date.now() / 1000);
}

function initAuth() {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('token');

  if (urlToken) {
    localStorage.setItem("token", urlToken);
    history.replaceState({}, '', '/');
  }

  const token = localStorage.getItem("token");

  if (token && isTokenValid(token)) {
    const payload = parseJwtPayload(token);
    showDashboard(payload.name);
  } else {
    document.getElementById("auth-overlay").style.display = "flex";
  }
}

function showDashboard(name) {
  document.getElementById("auth-overlay").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("user-bar").style.display = "flex";
  document.getElementById("user-name").textContent = name;
  main();
}

async function submitLogin() {
  const email = document.getElementById("login-email").value;
  const password = document.getElementById("login-password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await safeJson(res);

  if (!res.ok || !data || !data.token) {
    document.getElementById("auth-error").textContent = data?.error || "Login failed";
    return;
  }

  localStorage.setItem("token", data.token);
  showDashboard(data.name);
}

async function submitRegister() {
  const name = document.getElementById("reg-name").value;
  const email = document.getElementById("reg-email").value;
  const password = document.getElementById("reg-password").value;

  const res = await fetch("/api/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, email, password })
  });

  const data = await safeJson(res);

  if (!res.ok || !data || !data.token) {
    document.getElementById("auth-error").textContent = data?.error || "Register failed";
    return;
  }

  localStorage.setItem("token", data.token);
  showDashboard(data.name);
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

async function main() {
  const status = document.getElementById("status");
  const charts = document.getElementById("charts");

  try {
    const res = await fetch(API_URL);
    const data = await safeJson(res);

    if (!data) throw new Error("Invalid API response");

    charts.innerHTML = "";
    (data.charts || []).forEach(url => {
      const img = document.createElement("img");
      img.src = url;
      img.style.width = "100%";
      charts.appendChild(img);
    });

    status.style.display = "none";
  } catch (err) {
    status.textContent = "Error loading data";
  }
}

initAuth();
</script>

</body>
</html>
