<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diet Analysis Heatmaps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.5rem;
      color: #888;
      font-size: 0.95rem;
    }

    #status {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #aaa;
    }

    #status.error { color: #ff6b6b; }

    /* Section labels */
    .section-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.75rem;
    }

    /* Filter button groups */
    .filter-group {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }

    .filter-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      border: 1px solid #2a2d3a;
      background: #1a1d27;
      color: #c9d1e0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      text-transform: capitalize;
    }

    .filter-btn:hover {
      border-color: #4f6ef7;
      color: #ffffff;
    }

    .filter-btn.active {
      background: #4f6ef7;
      border-color: #4f6ef7;
      color: #ffffff;
      font-weight: 600;
    }

    .filter-btn.cuisine.active {
      background: #2ecc71;
      border-color: #2ecc71;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #2a2d3a;
      max-width: 800px;
      margin: 1.5rem auto;
    }

    /* Nutrient panel */
    #nutrient-panel {
      max-width: 600px;
      margin: 0 auto 2rem;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 1.5rem;
      display: none;
    }

    #nutrient-panel h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 1.25rem;
      text-transform: capitalize;
    }

    .nutrient-bars {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .nutrient-row label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.35rem;
    }

    .nutrient-row label span { color: #ffffff; font-weight: 600; }

    .bar-track {
      background: #2a2d3a;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .bar-fill.protein { background: #4f6ef7; }
    .bar-fill.carbs   { background: #f7a24f; }
    .bar-fill.fat     { background: #f74f4f; }

    /* Recipe panel */
    #recipe-panel {
      max-width: 800px;
      margin: 0 auto 2rem;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 1.5rem;
      display: none;
    }

    #recipe-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
    }

    #recipe-panel h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      text-transform: capitalize;
    }

    #recipe-count {
      font-size: 0.8rem;
      color: #666;
    }

    #recipe-search {
      width: 100%;
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e0e0e0;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      outline: none;
    }

    #recipe-search:focus { border-color: #2ecc71; }

    #recipe-list {
      list-style: none;
      max-height: 360px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2a2d3a transparent;
    }

    #recipe-list li {
      padding: 0.55rem 0.5rem;
      border-bottom: 1px solid #1f2230;
      font-size: 0.88rem;
      color: #c9d1e0;
    }

    #recipe-list li:last-child { border-bottom: none; }

    /* Chart images */
    #charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .chart-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .chart-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #c9d1e0;
      margin-bottom: 1rem;
      text-transform: capitalize;
    }

    .chart-card img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }

    @media (max-width: 900px) {
      #charts { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Diet Analysis Dashboard</h1>
  <p>Macronutrient breakdown across popular diet types</p>
</header>

<div id="status">Loading data from API...</div>

<!-- Diet type filters -->
<div id="diet-section" style="display:none;">
  <p class="section-label">Diet Type</p>
  <div class="filter-group" id="diet-filters">
    <button class="filter-btn" data-diet="dash">DASH</button>
    <button class="filter-btn" data-diet="keto">Keto</button>
    <button class="filter-btn" data-diet="mediterranean">Mediterranean</button>
    <button class="filter-btn" data-diet="paleo">Paleo</button>
    <button class="filter-btn" data-diet="vegan">Vegan</button>
  </div>
</div>

<div id="nutrient-panel">
  <h2 id="panel-title"></h2>
  <div class="nutrient-bars">
    <div class="nutrient-row">
      <label>Protein <span id="val-protein"></span></label>
      <div class="bar-track"><div class="bar-fill protein" id="bar-protein"></div></div>
    </div>
    <div class="nutrient-row">
      <label>Carbs <span id="val-carbs"></span></label>
      <div class="bar-track"><div class="bar-fill carbs" id="bar-carbs"></div></div>
    </div>
    <div class="nutrient-row">
      <label>Fat <span id="val-fat"></span></label>
      <div class="bar-track"><div class="bar-fill fat" id="bar-fat"></div></div>
    </div>
  </div>
</div>

<hr class="divider" id="divider" style="display:none;" />

<!-- Cuisine type filters -->
<div id="cuisine-section" style="display:none;">
  <p class="section-label">Cuisine Type</p>
  <div class="filter-group" id="cuisine-filters"></div>
</div>

<div id="recipe-panel">
  <div id="recipe-panel-header">
    <h2 id="recipe-title"></h2>
    <span id="recipe-count"></span>
  </div>
  <input type="search" id="recipe-search" placeholder="Search recipes..." />
  <ul id="recipe-list"></ul>
</div>

<hr class="divider" id="divider2" style="display:none;" />

<div id="charts" style="display:none;"></div>

<script>
  const API_URL = "https://dietanalysis-akg9fehjc3g2htah.canadacentral-01.azurewebsites.net/api/AnalysisFunction";

  let records = {};
  let cuisineRecipes = {};
  let currentRecipes = [];

  function showDiet(dietKey) {
    const entry = records[dietKey];
    if (!entry) return;

    document.querySelectorAll("#diet-filters .filter-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.diet === dietKey);
    });

    const allVals = Object.values(records).flatMap(r => [r.protein, r.carbs, r.fat]);
    const max = Math.max(...allVals);

    document.getElementById("panel-title").textContent = entry.name + " Diet";
    document.getElementById("val-protein").textContent = entry.protein.toFixed(1) + " g";
    document.getElementById("val-carbs").textContent   = entry.carbs.toFixed(1) + " g";
    document.getElementById("val-fat").textContent     = entry.fat.toFixed(1) + " g";
    document.getElementById("bar-protein").style.width = (entry.protein / max * 100) + "%";
    document.getElementById("bar-carbs").style.width   = (entry.carbs   / max * 100) + "%";
    document.getElementById("bar-fat").style.width     = (entry.fat     / max * 100) + "%";

    document.getElementById("nutrient-panel").style.display = "block";
  }

  function renderRecipeList(recipes) {
    const list = document.getElementById("recipe-list");
    list.innerHTML = "";
    recipes.forEach(name => {
      const li = document.createElement("li");
      li.textContent = name;
      list.appendChild(li);
    });
    document.getElementById("recipe-count").textContent = `${recipes.length} recipes`;
  }

  function showCuisine(cuisineKey) {
    currentRecipes = cuisineRecipes[cuisineKey] ?? [];

    document.querySelectorAll("#cuisine-filters .filter-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.cuisine === cuisineKey);
    });

    document.getElementById("recipe-title").textContent = cuisineKey + " Recipes";
    document.getElementById("recipe-search").value = "";
    renderRecipeList(currentRecipes);
    document.getElementById("recipe-panel").style.display = "block";
  }

  async function main() {
    const statusEl        = document.getElementById("status");
    const chartsEl        = document.getElementById("charts");
    const dietSection     = document.getElementById("diet-section");
    const cuisineSection  = document.getElementById("cuisine-section");
    const divider         = document.getElementById("divider");
    const divider2        = document.getElementById("divider2");

    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      const data = await res.json();

      // Index diet records
      (data.records ?? []).forEach(item => {
        const key = (item.Diet_type ?? "").toLowerCase();
        records[key] = {
          name:    item.Diet_type,
          protein: +(item["Protein(g)"] ?? 0),
          carbs:   +(item["Carbs(g)"]   ?? 0),
          fat:     +(item["Fat(g)"]     ?? 0),
        };
      });

      // Wire up diet buttons
      document.querySelectorAll("#diet-filters .filter-btn").forEach(btn => {
        btn.addEventListener("click", () => showDiet(btn.dataset.diet));
      });

      // Build cuisine buttons dynamically
      cuisineRecipes = data.recipes ?? {};
      const cuisineFiltersEl = document.getElementById("cuisine-filters");
      Object.keys(cuisineRecipes).sort().forEach(cuisine => {
        const btn = document.createElement("button");
        btn.className = "filter-btn cuisine";
        btn.dataset.cuisine = cuisine;
        btn.textContent = cuisine;
        btn.addEventListener("click", () => showCuisine(cuisine));
        cuisineFiltersEl.appendChild(btn);
      });

      // Search filter
      document.getElementById("recipe-search").addEventListener("input", e => {
        const q = e.target.value.toLowerCase();
        const filtered = q ? currentRecipes.filter(r => r.toLowerCase().includes(q)) : currentRecipes;
        renderRecipeList(filtered);
      });

      // Render chart images
      (data.charts ?? []).forEach(url => {
        const title = url.split("/").pop().replace(/\.\w+$/, "").replace(/_/g, " ");
        const card = document.createElement("div");
        card.className = "chart-card";
        card.innerHTML = `<h2>${title}</h2><img src="${url}" alt="${title}" />`;
        chartsEl.appendChild(card);
      });

      statusEl.style.display       = "none";
      dietSection.style.display    = "block";
      divider.style.display        = "block";
      cuisineSection.style.display = "block";
      divider2.style.display       = "block";
      chartsEl.style.display       = "grid";

    } catch (err) {
      statusEl.textContent = `Failed to load data: ${err.message}`;
      statusEl.className = "error";
      console.error(err);
    }
  }

  main();
</script>
</body>
</html>
